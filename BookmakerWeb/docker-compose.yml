version: '3.8'

services:
  bookmaker-api:
    # Используем переменную из .env файла
    image: ${IMAGE_NAME}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${EXTERNAL_PORT}:8080"  # Внешний порт берётся из .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - db_data:/app/data  # Том для сохранения базы данных
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db_data:    
    driver: local





    